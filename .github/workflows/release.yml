name: Release

# v로 시작하는 태그를 푸시하면(예: v1.0.0) 릴리즈를 만들고
# Windows / macOS 실행 앱을 빌드해 압축 파일을 첨부합니다.
# (workflow_dispatch 로 수동 실행하면 빌드만 하고 릴리즈는 건너뜁니다 — 빌드 점검용)
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Windows: 단일 .exe ────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Sealock.exe
        run: >
          pyinstaller --noconfirm --clean --onefile --windowed
          --name Sealock
          --icon icons/icon_win.ico
          --add-data "sealock/assets;sealock/assets"
          app.py

      - name: Zip
        run: Compress-Archive -Path dist/Sealock.exe -DestinationPath Sealock-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: Sealock-Windows
          path: Sealock-Windows.zip

  # ── macOS (Apple Silicon): .app 번들 ─────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Sealock.app
        run: >
          pyinstaller --noconfirm --clean --windowed
          --name Sealock
          --icon icons/icon_mac.icns
          --osx-bundle-identifier com.sealock.app
          --add-data "sealock/assets:sealock/assets"
          app.py

      # ditto 로 압축해 .app 번들의 심볼릭 링크/권한을 보존합니다.
      - name: Zip .app
        run: ditto -c -k --sequesterRsrc --keepParent dist/Sealock.app Sealock-macOS.zip

      - uses: actions/upload-artifact@v4
        with:
          name: Sealock-macOS
          path: Sealock-macOS.zip

  # ── 릴리즈: 태그 푸시일 때만, 두 압축 파일을 첨부 ─────────────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Sealock-Windows/Sealock-Windows.zip
            artifacts/Sealock-macOS/Sealock-macOS.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
          append_body: true
          body: |
            ## 다운로드

            | 플랫폼 | 파일 | 실행 |
            |--------|------|------|
            | 🪟 Windows | `Sealock-Windows.zip` | 압축 해제 후 `Sealock.exe` 실행 |
            | 🍎 macOS (Apple Silicon) | `Sealock-macOS.zip` | 압축 해제 후 `Sealock.app` 실행 |

            > **macOS 첫 실행 안내** — 코드 서명이 안 된 앱이라 Gatekeeper가 막을 수 있습니다.
            > `Sealock.app`을 **우클릭 → 열기**(처음 한 번만)로 여세요. 그래도 막히면 터미널에서
            > `xattr -dr com.apple.quarantine Sealock.app` 실행 후 다시 여세요.
